<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alba — Atelier di Bellezza</title>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- LAYOUT: tutto lo stile è in style.css -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= HEADER / NAV ================= -->
<header id="site-header">
  <nav>
    <a href="#" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 21c-4-3-7-6.5-7-10.5A7 7 0 0 1 12 4a7 7 0 0 1 7 6.5C19 14.5 16 18 12 21Z"/></svg>
      <span id="logo-nome"></span>
    </a>
    <div class="nav-links">
      <a href="#servizi" id="nav-servizi"></a>
      <a href="#rituale" id="nav-rituale"></a>
      <a href="#prezzi" id="nav-prezzi"></a>
      <a href="#testimonianze" id="nav-recensioni"></a>
      <a href="#prenota" id="nav-contatti"></a>
    </div>
    <a href="#prenota" class="btn" id="nav-prenota"></a>
  </nav>
</header>

<!-- ================= HERO ================= -->
<section class="hero">
  <svg class="hero-blob" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
    <path fill="#E3B8AE" d="M431,321Q412,392,341,414Q270,436,213,393Q156,350,120,282Q84,214,133,159Q182,104,251,95Q320,86,373,133Q426,180,437,250Q448,320,431,321Z"/>
    <path fill="none" stroke="#B8925A" stroke-width="1" opacity="0.6" d="M431,321Q412,392,341,414Q270,436,213,393Q156,350,120,282Q84,214,133,159Q182,104,251,95Q320,86,373,133Q426,180,437,250Q448,320,431,321Z"/>
  </svg>

  <div class="wrap hero-content">
    <span class="eyebrow" id="hero-eyebrow"></span>
    <h1 id="hero-titolo"></h1>
    <p class="lead" id="hero-testo"></p>
    <div class="hero-actions">
      <a href="#prenota" class="btn" id="hero-cta-primario"></a>
      <a href="#rituale" class="btn btn-outline" id="hero-cta-secondario"></a>
    </div>
    <div class="hero-stats reveal" id="hero-stats"></div>
  </div>
</section>

<!-- ================= SERVIZI ================= -->
<section id="servizi">
  <div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="servizi-eyebrow"></span>
      <h2 id="servizi-titolo"></h2>
      <p id="servizi-testo"></p>
    </div>
    <div class="servizi-grid reveal" id="servizi-grid"></div>
  </div>
</section>

<!-- ================= IL RITUALE ================= -->
<section id="rituale" class="rituale">
  <div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="rituale-eyebrow"></span>
      <h2 id="rituale-titolo"></h2>
      <p id="rituale-testo"></p>
    </div>
    <div class="ritual-path reveal" id="ritual-path"></div>
  </div>
</section>

<!-- ================= PREZZI ================= -->
<section id="prezzi">
  <div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="prezzi-eyebrow"></span>
      <h2 id="prezzi-titolo"></h2>
      <p id="prezzi-testo"></p>
    </div>
    <div class="prezzi-cols reveal">
      <div class="prezzi-list" id="prezzi-colonna-1"></div>
      <div class="prezzi-list" id="prezzi-colonna-2"></div>
    </div>
  </div>
</section>

<!-- ================= TESTIMONIANZE ================= -->
<section id="testimonianze">
  <div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="testimonianze-eyebrow"></span>
      <h2 id="testimonianze-titolo"></h2>
    </div>
    <div class="testi-grid reveal" id="testimonianze-grid"></div>
  </div>
</section>

<!-- ================= PRENOTA / CONTATTI ================= -->
<section id="prenota" class="prenota">
  <div class="wrap">
    <div class="prenota-grid">

      <div class="reveal">
        <span class="eyebrow" id="prenota-eyebrow"></span>
        <h2 id="prenota-titolo"></h2>
        <p class="lead" id="prenota-testo"></p>

        <div class="info-riga">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M12 21c-4-3-7-6.5-7-10.5A7 7 0 0 1 12 4a7 7 0 0 1 7 6.5C19 14.5 16 18 12 21Z"/></svg>
          <div><strong>Indirizzo</strong><span id="contatto-indirizzo"></span></div>
        </div>
        <div class="info-riga">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M12 7v5l3 3M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z"/></svg>
          <div><strong>Orari</strong><span id="contatto-orari"></span></div>
        </div>
        <div class="info-riga">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4 5h16v14H4z"/><path d="M4 6l8 7 8-7"/></svg>
          <div><strong>Contatti</strong><span id="contatto-telefono-email"></span></div>
        </div>
      </div>

      <div class="form-card reveal">
        <label for="input-nome" id="label-nome"></label>
        <input id="input-nome" type="text">

        <label for="input-telefono" id="label-telefono"></label>
        <input id="input-telefono" type="tel">

        <label for="select-servizio" id="label-servizio"></label>
        <select id="select-servizio"></select>

        <label for="input-note" id="label-note"></label>
        <textarea id="input-note"></textarea>

        <button type="button" class="btn" id="bottone-invia"></button>
        <p class="form-note" id="form-nota"></p>
      </div>

    </div>
  </div>
</section>

<!-- ================= FOOTER ================= -->
<footer>
  <div class="wrap">
    <div class="footer-grid">
      <div>
        <a href="#" class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 21c-4-3-7-6.5-7-10.5A7 7 0 0 1 12 4a7 7 0 0 1 7 6.5C19 14.5 16 18 12 21Z"/></svg>
          <span id="footer-logo-nome"></span>
        </a>
        <p style="margin-top:1rem; font-size:0.9rem; max-width:280px; color:rgba(250,246,240,0.55);" id="footer-descrizione"></p>
      </div>
      <div>
        <h4 id="footer-naviga-titolo"></h4>
        <ul id="footer-naviga-voci"></ul>
      </div>
      <div>
        <h4 id="footer-social-titolo"></h4>
        <ul id="footer-social-voci"></ul>
      </div>
    </div>
    <div class="footer-bottom">
      <span id="footer-copyright"></span>
      <span id="footer-piva"></span>
    </div>
  </div>
</footer>

<!-- ================= SCRIPT ================= -->
<!-- SCRITTE: tutti i testi del sito -->
<script src="testi.js"></script>
<!-- CONTATTI: indirizzo, orari, telefono, email, social -->
<script src="contatti.js"></script>
<!-- Collega testi e contatti alla pagina, gestisce le interazioni -->
<script src="script.js"></script>
</body>
</html>
